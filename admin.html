<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>下载统计 · 太阳花守护后台</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { background: var(--bg-base); }
    .admin-wrap {
      max-width: 560px;
      margin: 80px auto;
      padding: 0 24px;
    }
    .admin-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--divider);
    }
    .admin-card h1 {
      font-size: 24px;
      color: var(--text-primary);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .admin-card .sub { color: var(--text-hint); font-size: 14px; margin-bottom: 26px; }
    .admin-card label { display: block; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .admin-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--divider);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      transition: border-color .2s;
    }
    .admin-card input:focus { outline: none; border-color: var(--brand-primary); }
    .admin-card button {
      width: 100%;
      margin-top: 18px;
      background: var(--brand-gradient);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-card button:hover { opacity: .92; }
    .err { color: var(--danger); font-size: 14px; margin-top: 12px; min-height: 18px; }

    .stats { display: none; margin-top: 30px; }
    .stats.show { display: block; }
    .stat-total {
      background: var(--brand-gradient);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin-bottom: 18px;
    }
    .stat-total .num { font-size: 40px; font-weight: 800; line-height: 1; }
    .stat-total .lbl { font-size: 14px; opacity: .92; margin-top: 6px; }
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: var(--bg-base);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
    }
    .stat-row .name { font-weight: 600; color: var(--text-primary); }
    .stat-row .name span { margin-right: 8px; font-size: 20px; }
    .stat-row .val { font-size: 22px; font-weight: 700; color: var(--brand-primary-dark); }
    .stat-actions { margin-top: 18px; text-align: right; }
    .stat-actions button {
      width: auto;
      margin: 0;
      background: #fff;
      color: var(--text-body);
      border: 1.5px solid var(--divider);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
    }
    .stat-actions button:hover { border-color: var(--brand-primary); color: var(--brand-primary-dark); }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-card">
      <h1>🌻 下载统计后台</h1>
      <p class="sub">太阳花守护 · 输入 Admin Token 查看各平台下载量</p>

      <form id="loginForm">
        <label for="token">Admin Token</label>
        <input type="password" id="token" placeholder="请输入访问令牌" autocomplete="off" required />
        <button type="submit">查看统计</button>
        <div class="err" id="err"></div>
      </form>

      <div class="stats" id="stats">
        <div class="stat-total">
          <div class="num" id="totalNum">0</div>
          <div class="lbl">累计总下载量</div>
        </div>
        <div class="stat-row">
          <div class="name"><span>🤖</span>Android</div>
          <div class="val" id="n-android">0</div>
        </div>
        <div class="stat-row">
          <div class="name"><span>📱</span>HarmonyOS</div>
          <div class="val" id="n-harmonyos">0</div>
        </div>
        <div class="stat-row">
          <div class="name"><span>🍎</span>iOS</div>
          <div class="val" id="n-ios">0</div>
        </div>
        <div class="stat-actions">
          <button id="refresh">刷新</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
